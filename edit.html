<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오 편집 · ETF Tracker</title>
<style>
  :root {
    --bg: #fff; --bg-soft: #fafafa; --bg-card: #fff;
    --ink: #0b0f17; --ink-2: #3a3f47; --ink-3: #6b727c; --ink-4: #9aa1ab;
    --line: #ececec;
    --brand: #0a66ff; --brand-soft: #eaf1ff;
    --buy: #0e8a4f; --buy-soft: #e7f6ee;
    --watch: #c2811a; --watch-soft: #fdf4e3;
    --pass: #7c818b; --pass-soft: #f1f2f4;
    --danger: #d23030; --danger-soft: #fdeaea;
    --radius: 14px; --radius-sm: 10px; --radius-xs: 6px; --radius-pill: 999px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212; --bg-soft: #1e1e1e; --bg-card: #252525;
      --ink: #f0f0f0; --ink-2: #d0d0d0; --ink-3: #a0a0a0; --ink-4: #707070;
      --line: #333;
      --brand: #4d94ff; --brand-soft: #1a2e4a;
      --buy: #2ecc71; --buy-soft: #1a3d2a;
      --watch: #e6a817; --watch-soft: #3d3011;
      --pass: #888; --pass-soft: #2a2a2a;
      --danger: #ff6b6b; --danger-soft: #3d1a1a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg-soft); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    line-height: 1.5; padding: 16px;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--ink-3); font-size: 13px; margin-bottom: 16px; }
  .card {
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
  }
  .acc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .acc-title { font-size: 16px; font-weight: 600; }
  .wsum { font-size: 13px; padding: 3px 10px; border-radius: var(--radius-pill); }
  .wsum.ok { background: var(--buy-soft); color: var(--buy); }
  .wsum.warn { background: var(--watch-soft); color: var(--watch); }
  .wsum.bad { background: var(--danger-soft); color: var(--danger); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--ink-3); font-weight: 500; padding: 6px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  td { padding: 6px 8px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  input[type=text], input[type=number] {
    width: 100%; min-width: 64px; padding: 6px 8px; border: 1px solid var(--line);
    border-radius: var(--radius-xs); background: var(--bg); color: var(--ink); font-size: 13px;
  }
  input:focus { outline: 2px solid var(--brand-soft); border-color: var(--brand); }
  .code-input { font-family: monospace; }
  .seg { display: inline-flex; border: 1px solid var(--line); border-radius: var(--radius-pill); overflow: hidden; }
  .seg button { border: none; background: var(--bg); color: var(--ink-3); padding: 5px 12px; font-size: 12px; cursor: pointer; }
  .seg button.on-reg { background: var(--brand); color: #fff; }
  .seg button.on-obs { background: var(--watch); color: #fff; }
  .btn {
    border: 1px solid var(--line); background: var(--bg); color: var(--ink);
    padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
  }
  .btn:hover { border-color: var(--brand); }
  .btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); font-weight: 600; }
  .btn-add { color: var(--brand); border-style: dashed; width: 100%; margin-top: 8px; }
  .btn-del { color: var(--danger); border: none; background: none; cursor: pointer; font-size: 16px; padding: 4px 8px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0; }
  .hint { font-size: 12px; color: var(--ink-3); margin-top: 4px; }
  .auto-name { color: var(--ink-4); font-size: 11px; font-style: italic; }
  .banner { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 14px; }
  .banner-info { background: var(--brand-soft); color: var(--brand); }
  .name-cell { min-width: 140px; }
  details { margin-top: 12px; }
  summary { cursor: pointer; color: var(--ink-3); font-size: 13px; }
  pre { background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--radius-xs); padding: 10px; overflow-x: auto; font-size: 12px; }
  .col-narrow { width: 90px; }
  .col-mid { width: 110px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>포트폴리오 편집</h1>
  <div class="sub">목표비중·분류·메모 수정, 종목 추가/삭제. 수정 후 JSON을 내보내 로컬에서 apply_portfolio.py로 반영합니다.</div>

  <div class="banner banner-info">
    이 페이지는 저장 서버가 없습니다. 수정 → <strong>JSON 내보내기</strong> → 로컬 폴더에 저장 → <code>python apply_portfolio.py</code> 실행 순서로 반영됩니다.
  </div>

  <div id="accounts"></div>

  <div class="toolbar">
    <button class="btn" id="btn-reload">현재 포트폴리오 다시 불러오기</button>
    <button class="btn btn-primary" id="btn-export">JSON 내보내기 (portfolio_edit.json)</button>
  </div>

  <details>
    <summary>내보낼 JSON 미리보기</summary>
    <pre id="preview"></pre>
  </details>
</div>

<script>
// ── 상태 (메모리 only, localStorage 미사용) ──
const ACCOUNTS = ['ISA', '연금저축'];
let state = { 'ISA': [], '연금저축': [] };

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ── daily_scores.json에서 현재 포트폴리오 로드 ──
async function loadCurrent() {
  try {
    const res = await fetch('daily_scores.json?t=' + Date.now());
    if (!res.ok) throw new Error('daily_scores.json 로드 실패');
    const data = await res.json();
    state = { 'ISA': [], '연금저축': [] };
    for (const acc of ACCOUNTS) {
      const a = (data.accounts || {})[acc];
      if (!a || !a.stocks) continue;
      for (const s of a.stocks) {
        state[acc].push({
          code: s.code || '',
          name: s.name || '',
          category: s.category || '정기',
          target_weight: (s.target_weight != null ? s.target_weight : ''),
          qty: (s.qty != null ? s.qty : ''),
          monthly: '',          // daily_scores.json에 없음 → 빈값 (apply 시 기존 유지 X, 0)
          avg_price: '',
          isNew: false
        });
      }
    }
    render();
  } catch (e) {
    alert('현재 포트폴리오를 불러오지 못했습니다.\n' + e.message +
          '\n\n이 페이지는 daily_scores.json과 같은 폴더(GitHub Pages 루트)에 있어야 합니다.');
  }
}

// ── 비중 합계 계산 (정기만) ──
function weightSum(acc) {
  return state[acc].filter(s => s.category === '정기')
    .reduce((sum, s) => sum + (parseFloat(s.target_weight) || 0), 0);
}

// ── 렌더 ──
function render() {
  const root = document.getElementById('accounts');
  root.innerHTML = '';
  for (const acc of ACCOUNTS) {
    const sum = weightSum(acc);
    const diff = Math.abs(sum - 100);
    let cls = 'ok', label = `정기 합계 ${sum.toFixed(1)}%`;
    if (diff > 5) { cls = 'bad'; label += ' · 100%에서 5%p 초과 (저장 차단)'; }
    else if (diff > 0.01) { cls = 'warn'; label += ' · 100%와 차이 있음 (경고)'; }
    else { label += ' · 정상'; }

    const card = document.createElement('div');
    card.className = 'card';
    let html = `<div class="acc-head">
      <div class="acc-title">${esc(acc)}</div>
      <div class="wsum ${cls}">${esc(label)}</div>
    </div>
    <div style="overflow-x:auto"><table><thead><tr>
      <th class="code-col">종목코드</th><th class="name-cell">종목명</th>
      <th>분류</th><th class="col-narrow">목표비중%</th>
      <th class="col-narrow">보유수량</th><th class="col-mid">월적립액</th><th></th>
    </tr></thead><tbody>`;

    state[acc].forEach((s, i) => {
      const isObs = s.category === '관찰';
      const nameCell = s.isNew && !s.name
        ? `<span class="auto-name">apply 시 자동 조회</span>`
        : esc(s.name);
      html += `<tr>
        <td><input type="text" class="code-input" value="${esc(s.code)}"
             data-acc="${acc}" data-i="${i}" data-f="code" maxlength="6"
             ${s.isNew ? '' : 'readonly'} style="${s.isNew ? '' : 'background:var(--bg-soft);color:var(--ink-3)'}"></td>
        <td class="name-cell">${nameCell}</td>
        <td><span class="seg">
          <button class="${!isObs ? 'on-reg' : ''}" data-acc="${acc}" data-i="${i}" data-cat="정기">정기</button>
          <button class="${isObs ? 'on-obs' : ''}" data-acc="${acc}" data-i="${i}" data-cat="관찰">관찰</button>
        </span></td>
        <td>${isObs
          ? '<span class="auto-name">해당없음</span>'
          : `<input type="number" step="0.1" value="${esc(s.target_weight)}" data-acc="${acc}" data-i="${i}" data-f="target_weight">`}</td>
        <td><input type="number" step="1" value="${esc(s.qty)}" data-acc="${acc}" data-i="${i}" data-f="qty"></td>
        <td><input type="number" step="1000" value="${esc(s.monthly)}" data-acc="${acc}" data-i="${i}" data-f="monthly" placeholder="0"></td>
        <td><button class="btn-del" data-acc="${acc}" data-i="${i}" data-del="1" title="삭제">×</button></td>
      </tr>`;
    });

    html += `</tbody></table></div>
      <button class="btn btn-add" data-acc="${acc}" data-add="1">+ 종목 추가 (코드만 입력, 이름 자동)</button>`;
    card.innerHTML = html;
    root.appendChild(card);
  }
  updatePreview();
}

// ── 이벤트 위임 ──
document.getElementById('accounts').addEventListener('click', (e) => {
  const t = e.target;
  if (t.dataset.del) {
    const { acc, i } = t.dataset;
    if (confirm(`${state[acc][i].name || state[acc][i].code} 종목을 삭제할까요?`)) {
      state[acc].splice(parseInt(i), 1);
      render();
    }
  } else if (t.dataset.add) {
    const acc = t.dataset.add ? t.dataset.acc : null;
    if (acc) {
      state[acc].push({ code:'', name:'', category:'정기', target_weight:'', qty:'', monthly:'', avg_price:'', isNew:true });
      render();
    }
  } else if (t.dataset.cat) {
    const { acc, i, cat } = t.dataset;
    state[acc][parseInt(i)].category = cat;
    render();
  }
});

document.getElementById('accounts').addEventListener('input', (e) => {
  const t = e.target;
  const { acc, i, f } = t.dataset;
  if (acc != null && i != null && f) {
    let v = t.value;
    if (f === 'code') v = v.toUpperCase();
    state[acc][parseInt(i)][f] = v;
    if (f === 'target_weight' || f === 'code') {
      // 합계 배지만 갱신 (전체 재렌더 시 포커스 이탈 방지 위해 부분 갱신)
      const sum = weightSum(acc);
      // 간단히 전체 갱신은 비중일 때만
    }
    updatePreview();
    // 비중 배지 갱신
    refreshBadges();
  }
});

function refreshBadges() {
  const cards = document.querySelectorAll('#accounts .card');
  ACCOUNTS.forEach((acc, idx) => {
    const badge = cards[idx] && cards[idx].querySelector('.wsum');
    if (!badge) return;
    const sum = weightSum(acc);
    const diff = Math.abs(sum - 100);
    let cls = 'ok', label = `정기 합계 ${sum.toFixed(1)}%`;
    if (diff > 5) { cls = 'bad'; label += ' · 100%에서 5%p 초과 (저장 차단)'; }
    else if (diff > 0.01) { cls = 'warn'; label += ' · 100%와 차이 있음 (경고)'; }
    else { label += ' · 정상'; }
    badge.className = 'wsum ' + cls;
    badge.textContent = label;
  });
}

// ── JSON 빌드 ──
function buildJson() {
  const accounts = {};
  for (const acc of ACCOUNTS) {
    accounts[acc] = state[acc].map(s => ({
      code: s.code,
      name: s.isNew && !s.name ? '' : s.name,  // 신규는 빈 이름 → apply가 조회
      category: s.category,
      target_weight: s.category === '관찰' ? null : (s.target_weight === '' ? 0 : parseFloat(s.target_weight)),
      qty: s.qty === '' ? 0 : parseFloat(s.qty),
      monthly: s.monthly === '' ? 0 : parseFloat(s.monthly),
      avg_price: s.avg_price === '' ? null : parseFloat(s.avg_price)
    }));
  }
  return { schema: 'portfolio_edit_v1', exported_at: new Date().toISOString(), accounts };
}

function updatePreview() {
  document.getElementById('preview').textContent = JSON.stringify(buildJson(), null, 2);
}

// ── 내보내기 ──
function exportJson() {
  // 차단 조건 사전 안내
  const blocked = [];
  for (const acc of ACCOUNTS) {
    if (state[acc].length === 0) continue;
    const diff = Math.abs(weightSum(acc) - 100);
    if (diff > 5) blocked.push(`${acc}: 정기 비중 합 ${weightSum(acc).toFixed(1)}%`);
    // 빈 코드 체크
    state[acc].forEach(s => {
      if (!s.code || s.code.length !== 6) blocked.push(`${acc}: 잘못된 종목코드 '${s.code}'`);
    });
  }
  if (blocked.length) {
    if (!confirm('다음 항목은 apply_portfolio.py에서 저장 차단될 수 있습니다:\n\n' +
                 blocked.join('\n') + '\n\n그래도 JSON을 내보낼까요?')) return;
  }

  const blob = new Blob([JSON.stringify(buildJson(), null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'portfolio_edit.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('btn-reload').addEventListener('click', loadCurrent);
document.getElementById('btn-export').addEventListener('click', exportJson);

// 초기 로드
loadCurrent();
</script>
</body>
</html>
